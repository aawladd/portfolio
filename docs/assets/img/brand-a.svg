<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Editable A Monogram Icon</title>
  <desc id="desc">An Illustrator-editable academic monogram icon built with vector shapes, featuring the letter A.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e4b50"/>
      <stop offset="65%" stop-color="#1d6367"/>
      <stop offset="100%" stop-color="#b88a44"/>
    </linearGradient>
    <linearGradient id="ringGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#eadfc9"/>
    </linearGradient>
  </defs>

  <!-- Layer: base card -->
  <g id="base_card">
    <rect x="8" y="8" width="304" height="304" rx="68" fill="#f7f3ea"/>
  </g>

  <!-- Layer: main medallion -->
  <g id="main_medallion">
    <circle cx="160" cy="160" r="116" fill="url(#bgGradient)"/>
    <circle cx="160" cy="160" r="97" fill="none" stroke="url(#ringGradient)" stroke-width="5" opacity="0.9"/>
    <path d="M77 225c18 18 46 31 83 31 42 0 73-14 92-36" fill="none" stroke="#d9bf87" stroke-width="7" stroke-linecap="round" opacity="0.92"/>
  </g>

  <!-- Layer: decorative research orbit -->
  <g id="research_orbit" opacity="0.28">
    <path d="M101 112c18-18 38-27 59-27 34 0 63 22 81 55" fill="none" stroke="#f6f0e3" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="242" cy="140" r="4.6" fill="#f6f0e3"/>
    <circle cx="101" cy="112" r="4.6" fill="#f6f0e3"/>
  </g>

  <!-- Layer: letter A -->
  <g id="letter_A" fill="#fbf7ef">
    <!-- left leg -->
    <path d="M98 222 146 92h20L119 222Z"/>
    <!-- right leg -->
    <path d="M201 222 154 92h20l48 130Z"/>
    <!-- crossbar -->
    <path d="M124 172h72v18h-72z"/>
    <!-- inner accent cut-inspired shape -->
    <path d="M151 124h18l15 39h-15l-9-24-9 24h-15z" opacity="0.18"/>
  </g>

  <!-- Layer: small bottom rule -->
  <g id="bottom_rule">
    <path d="M106 242h108" fill="none" stroke="#f2e6cc" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
