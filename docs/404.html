<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <title>404 | Page not found</title>
  <meta name="description" content="Page not found" />
</head>
<body data-page="404">
  <div class="site-noise"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="grid-overlay"></div>
  <main class="not-found-wrap">
    <div class="container narrow">
      <div class="hero-statement not-found-card reveal visible">
        <span class="eyebrow">404</span>
        <h1>That page could not be found.</h1>
        <p class="lead">The link may be broken, or the page may have been moved.</p>
        <div class="hero-actions" style="justify-content:center;">
          <a class="btn btn-primary" href="index.html">Back to homepage</a>
        </div>
      </div>
    </div>
  </main>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</body>
</html>
